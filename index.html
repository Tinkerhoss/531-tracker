                                                </button>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}

                        {/* TAB 4: ANALYTICS */}
                        {activeTab === 'analytics' && (
                            <div className="space-y-6">
                                <div className="p-6 rounded-2xl bg-zinc-900 border border-zinc-800 shadow-md">
                                    <h3 className="text-lg font-bold flex items-center gap-1.5">
                                        <Icon name="trending" className="w-5 h-5 text-indigo-400" /> Estimated 1-Rep Max Trends
                                    </h3>
                                    <p className="text-xs opacity-75 mt-1">Calculations based on logs and AMRAP performance metrics using the Epley formulation.</p>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
                                        {Object.values(LIFTS).map(lift => {
                                            const trend = logs.filter(l => l.liftKey === lift.key && l.estimated1RM).reverse();
                                            const current1RM = trend[trend.length - 1]?.estimated1RM || calculateOneRepMax(settings.fiveRepMaxes[lift.key]);
                                            return (
                                                <div key={lift.key} className="p-4 rounded-xl bg-zinc-950 border border-zinc-800 flex flex-col justify-between shadow-inner">
                                                    <div>
                                                        <span className="text-[10px] uppercase font-bold text-indigo-400">{lift.name}</span>
                                                        <h4 className="text-xl font-black mt-1">{current1RM} kg <span className="text-xs font-normal opacity-50">Current Est</span></h4>
                                                    </div>
                                                    <div className="h-20 flex items-end space-x-1.5 mt-4 border-b border-zinc-800 pb-1">
                                                        {trend.length === 0 ? (
                                                            <span className="text-[10px] opacity-50 italic text-center w-full block py-2">No data logged</span>
                                                        ) : (
                                                            trend.map((p, idx) => {
                                                                const max = Math.max(...trend.map(t => t.estimated1RM));
                                                                const min = Math.min(...trend.map(t => t.estimated1RM));
                                                                const range = max - min || 1;
                                                                const pct = ((p.estimated1RM - min) / range) * 80 + 20;
                                                                return (
                                                                    <div key={idx} className="flex-1 bg-indigo-600 hover:bg-indigo-500 rounded-t h-full relative group transition-all" style={{ height: `${pct}%` }}>
                                                                        <div className="absolute bottom-full mb-1 left-1/2 -translate-x-1/2 bg-black text-[8px] px-1 py-0.5 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">
                                                                            {p.estimated1RM} kg
                                                                        </div>
                                                                    </div>
                                                                );
                                                            })
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB 5: SYSTEM CONFIGS */}
                        {activeTab === 'settings' && (
                            <div className="space-y-6">
                                <div className="p-6 rounded-2xl bg-zinc-900 border border-zinc-800 space-y-6 shadow-md">
                                    <div>
                                        <h3 className="text-xl font-black flex items-center gap-1.5">
                                            <Icon name="settings" className="w-5 h-5 text-indigo-400" /> Preferences
                                        </h3>
                                        <p className="text-xs opacity-70">Define system properties, standard bar weights, and protocol modifications.</p>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div>
                                            <label className="text-[10px] font-bold uppercase text-zinc-400 block mb-2">Barbell Base Weight</label>
                                            <div className="flex items-center space-x-2">
                                                <input type="number" value={settings.barWeight} onChange={e => setSettings({ ...settings, barWeight: Number(e.target.value) })} className="w-full text-center py-1.5 text-xs font-bold bg-zinc-950 border border-zinc-800 rounded-lg text-zinc-100" />
                                                <span className="text-xs font-semibold text-zinc-500">kg</span>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold uppercase text-zinc-400 block mb-2">Rounding Scale Increment</label>
                                            <select value={settings.roundingStep} onChange={e => setSettings({ ...settings, roundingStep: Number(e.target.value) })} className="w-full py-1.5 text-xs font-bold bg-zinc-950 border border-zinc-800 rounded-lg text-zinc-100 px-2 focus:outline-none">
                                                <option value="1">1.0 kg</option>
                                                <option value="2.5">2.5 kg</option>
                                                <option value="5">5.0 kg</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold uppercase text-zinc-400 block mb-2">Training Max Constant</label>
                                            <div className="flex gap-2">
                                                {[85, 90].map(pct => (
                                                    <button key={pct} onClick={() => setSettings({ ...settings, trainingMaxPercent: pct })} className={`flex-1 py-1.5 text-xs font-bold rounded-lg border ${settings.trainingMaxPercent === pct ? 'bg-indigo-600 border-indigo-500 text-white shadow-sm' : 'border-zinc-800 bg-zinc-950 text-zinc-400'}`}>
                                                        {pct}%
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    {/* Assistance Variation Selection */}
                                    <div className="pt-4 border-t border-zinc-800/50">
                                        <label className="text-[10px] font-bold uppercase text-zinc-400 block mb-2">Supplemental Assistance Template</label>
                                        <div className="grid grid-cols-3 gap-2">
                                            {[
                                                { key: 'FSL', name: 'First Set Last (FSL 5x5)' },
                                                { key: 'BBB', name: 'Boring But Big (BBB 5x10)' },
                                                { key: 'None', name: 'No Assistance / Clear' }
                                            ].map(template => (
                                                <button
                                                    key={template.key}
                                                    onClick={() => setSettings({ ...settings, assistanceTemplate: template.key })}
                                                    className={`py-2 text-xs font-bold rounded-lg border text-center ${settings.assistanceTemplate === template.key ? 'bg-indigo-600 border-indigo-500 text-white' : 'border-zinc-800 bg-zinc-950 text-zinc-400'}`}
                                                >
                                                    {template.name}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Accessory Planner Configuration */}
                                    <div className="pt-6 border-t border-zinc-800/50">
                                        <div className="mb-3">
                                            <h4 className="text-xs font-bold text-indigo-400 uppercase">Default Accessories (By Workout Day)</h4>
                                            <p className="text-[10px] opacity-65 mt-0.5">Program up to 2 customized exercises per block. Generates 3 sets of 10 reps automatically.</p>
                                        </div>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {Object.values(LIFTS).map(lift => (
                                                <div key={lift.key} className="p-3 bg-zinc-950 border border-zinc-800 rounded-xl space-y-2">
                                                    <span className="text-[10px] font-black tracking-wider text-zinc-400 uppercase">{lift.name} Day Work</span>
                                                    <div className="grid grid-cols-2 gap-2">
                                                        <input 
                                                            type="text" 
                                                            placeholder="Accessory 1" 
                                                            value={settings.accessoryExercises[lift.key]?.[0] || ''} 
                                                            onChange={e => handleAccessoryConfigChange(lift.key, 0, e.target.value)}
                                                            className="bg-zinc-900 border border-zinc-800 rounded px-2 py-1 text-xs font-semibold text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-indigo-500"
                                                        />
                                                        <input 
                                                            type="text" 
                                                            placeholder="Accessory 2" 
                                                            value={settings.accessoryExercises[lift.key]?.[1] || ''} 
                                                            onChange={e => handleAccessoryConfigChange(lift.key, 1, e.target.value)}
                                                            className="bg-zinc-900 border border-zinc-800 rounded px-2 py-1 text-xs font-semibold text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-indigo-500"
                                                        />
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* 5RM Edit inputs */}
                                    <div className="pt-6 border-t border-zinc-800">
                                        <div className="mb-4">
                                            <h4 className="text-xs font-bold text-indigo-400 uppercase">Edit Current 5-Rep Max (5RM) Lifts</h4>
                                            <p className="text-[10px] opacity-65 mt-0.5">The app calculates your 1RM using Epley's rule: 1RM = 5RM * 1.1667</p>
                                        </div>
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                            {Object.values(LIFTS).map(lift => {
                                                const fRM = settings.fiveRepMaxes[lift.key] || 100;
                                                const calculated1RM = calculateOneRepMax(fRM);
                                                const calculatedTM = calculateTrainingMax(fRM);
                                                return (
                                                    <div key={lift.key} className="p-3.5 rounded-xl bg-zinc-950 border border-zinc-800 shadow-inner">
                                                        <label className="text-[10px] font-bold uppercase block text-zinc-500">{lift.name}</label>
                                                        <input 
                                                            type="number" 
                                                            value={fRM} 
                                                            onChange={e => {
                                                                const fRMs = { ...settings.fiveRepMaxes, [lift.key]: Number(e.target.value) };
                                                                setSettings({ ...settings, fiveRepMaxes: fRMs });
                                                            }} 
                                                            className="w-full text-center py-1.5 font-bold text-xs bg-zinc-900 border border-zinc-800 rounded mt-2 text-zinc-100" 
                                                        />
                                                        <div className="text-[9px] opacity-65 mt-2 space-y-0.5 text-center">
                                                            <span className="block">Est. 1RM: <strong>{calculated1RM} kg</strong></span>
                                                            <span className="block">TM ({settings.trainingMaxPercent}%): <strong>{calculatedTM} kg</strong></span>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    {/* NEW: APPLICATION ENVIRONMENT SETTINGS BACKUP UTILITIES */}
                                    <div className="pt-6 border-t border-zinc-800 space-y-3">
                                        <div>
                                            <h4 className="text-xs font-bold text-indigo-400 uppercase">App Configuration Safety Net</h4>
                                            <p className="text-[10px] opacity-65 mt-0.5">Safeguard your settings configuration (5RMs, cycles, bar properties, accessories) against accidental device format clear.</p>
                                        </div>
                                        <div className="flex flex-col sm:flex-row gap-2">
                                            <button 
                                                onClick={handleBackupSettingsToClipboard}
                                                className="flex-1 py-2 bg-zinc-800 text-zinc-100 text-xs font-bold rounded-lg border border-zinc-700/60 hover:bg-zinc-750 flex items-center justify-center gap-1.5"
                                            >
                                                <Icon name="copy" className="w-3.5 h-3.5 text-indigo-400" /> Export Settings Code
                                            </button>
                                            <button 
                                                onClick={handleRestoreSettingsFromToken}
                                                className="flex-1 py-2 bg-indigo-950/40 text-indigo-300 text-xs font-bold rounded-lg border border-indigo-900/60 hover:bg-indigo-900/30 flex items-center justify-center gap-1.5"
                                            >
                                                <Icon name="upload" className="w-3.5 h-3.5" /> Import Settings Backup
                                            </button>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        )}
                    </main>

                    {/* PLATE MODAL */}
                    {showPlateModal && (
                        <div className="fixed inset-0 bg-black/75 z-50 flex items-center justify-center p-4">
                            <div className="bg-zinc-900 border border-zinc-800 text-zinc-100 rounded-2xl w-full max-w-md p-6 shadow-2xl">
                                <div className="flex justify-between items-start mb-4">
                                    <h3 className="text-base font-bold flex items-center gap-1">
                                        <Icon name="layers" className="w-4 h-4 text-indigo-400" /> Plate Layout (EACH side)
                                    </h3>
                                    <button onClick={() => setShowPlateModal(false)} className="text-xs bg-zinc-800 hover:bg-zinc-750 px-2 py-1 rounded">Close</button>
                                </div>
                                {plateCalcWeight && (() => {
                                    const res = calculatePlatesNeeded(plateCalcWeight);
                                    if (res.error) return <p className="text-xs text-amber-400 text-center">{res.error}</p>;
                                    return (
                                        <div className="space-y-4">
                                            <div className="bg-zinc-950 text-center p-4 rounded-xl border border-zinc-800">
                                                <span className="text-[10px] opacity-50 block">Target Weight:</span>
                                                <h4 className="text-2xl font-black text-indigo-400">{plateCalcWeight} kg</h4>
                                                <span className="text-[9px] opacity-60">Barbell Base Weight: {settings.barWeight} kg Included</span>
                                            </div>
                                            <div className="space-y-2">
                                                {Object.entries(res.plates).map(([plate, qty]) => (
                                                    <div key={plate} className="flex justify-between items-center text-xs p-2.5 bg-zinc-950 rounded border border-zinc-800">
                                                        <div className="flex items-center space-x-2">
                                                            <span className={`w-2.5 h-2.5 rounded-full ${
                                                                plate === '25' ? 'bg-red-500' :
                                                                plate === '20' ? 'bg-blue-500' :
                                                                plate === '15' ? 'bg-yellow-500' :
                                                                plate === '10' ? 'bg-green-500' : 'bg-zinc-400'
                                                            }`} />
                                                            <span>{plate} kg Plate</span>
                                                        </div>
                                                        <strong className="text-indigo-400">Qty: {qty} &times;</strong>
                                                    </div>
                                                ))}
                                            </div>
                                            {res.remainder > 0 && (
                                                <p className="text-[10px] text-amber-400 text-center">Uncalculable Remainder: {res.remainder.toFixed(2)} kg total</p>
                                            )}
                                        </div>
                                    );
                                })()}
                            </div>
                        </div>
                    )}

                    {/* Navigation bar bottom */}
                    <footer className="fixed bottom-0 left-0 right-0 border-t bg-zinc-900/95 border-zinc-800 text-zinc-400 z-40">
                        <div className="max-w-5xl mx-auto grid grid-cols-5 text-center py-2.5">
                            <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center justify-center text-[10px] ${activeTab === 'dashboard' ? 'text-indigo-400 font-bold' : ''}`}>
                                <Icon name="calendar" className="w-5 h-5 mb-0.5" />
                                <span>Cycle</span>
                            </button>
                            <button onClick={() => activeSession ? setActiveTab('active-workout') : triggerNotification("Start a workout first!", "info")} className={`flex flex-col items-center justify-center text-[10px] relative ${activeTab === 'active-workout' ? 'text-indigo-400 font-bold' : ''}`}>
                                {activeSession && <span className="absolute top-1 right-5 h-2 w-2 rounded-full bg-red-500 animate-ping" />}
                                <Icon name="dumbbell" className="w-5 h-5 mb-0.5" />
                                <span>Play</span>
                            </button>
                            <button onClick={() => setActiveTab('logs')} className={`flex flex-col items-center justify-center text-[10px] ${activeTab === 'logs' ? 'text-indigo-400 font-bold' : ''}`}>
                                <Icon name="history" className="w-5 h-5 mb-0.5" />
                                <span>Export</span>
                            </button>
                            <button onClick={() => setActiveTab('analytics')} className={`flex flex-col items-center justify-center text-[10px] ${activeTab === 'analytics' ? 'text-indigo-400 font-bold' : ''}`}>
                                <Icon name="trending" className="w-5 h-5 mb-0.5" />
                                <span>Charts</span>
                            </button>
                            <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center justify-center text-[10px] ${activeTab === 'settings' ? 'text-indigo-400 font-bold' : ''}`}>
                                <Icon name="settings" className="w-5 h-5 mb-0.5" />
                                <span>Settings</span>
                            </button>
                        </div>
                    </footer>
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
